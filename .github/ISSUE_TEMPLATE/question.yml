name: ❓ Question
description: Ask a question about object detection with Triton Inference Server
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Welcome to the object detection with Triton Inference Server project! Thank you for asking your question. This template will help you provide the necessary details. We appreciate your contribution to our community.

  - type: checkboxes
    attributes:
      label: Confirm
      description: |
        Before submitting your question, please ensure you have checked the provided resources to see if your question has already been answered.
      options:
        - label: |
            I have searched the project's documentation, issues, and discussions and found no similar questions.
          required: true

  - type: dropdown
    attributes:
      label: Select Component
      description: |
        Please select the component related to your question.
      options:
        - "Server Configuration"
        - "Model Repository"
        - "Inference"
        - "Performance Optimization"
        - "Integration"
        - "Other"
    validations:
      required: true

  - type: textarea
    attributes:
      label: "Question"
      description: |
        Provide a clear and concise question regarding your object detection implementation with Triton Inference Server. Include context, such as steps taken, attempts, and any relevant code snippets or logs.
      placeholder: |
        📝 Provide your question and context here.
        Example:
        "How can I optimize inference time when deploying a YOLO model on Triton Server?"
    validations:
      required: true

  - type: textarea
    attributes:
      label: "Additional Information"
      description: |
        Optional: Share any additional details that may help us understand your question better.
      placeholder: |
        - Relevant code snippets
        - Logs or error messages
        - Steps taken so far
        - Any other relevant information

  - type: checkboxes
    attributes:
      label: Contribution
      description: |
        Would you like to contribute to the project by submitting a Pull Request?
      options:
        - label: "Yes, I'd like to help!"
        - label: "No, I just need answers."