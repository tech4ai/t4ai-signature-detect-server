name: 🪡 Codebase Improvement
description: Provide your feedback for the existing codebase. Suggest a better solution for algorithms, development tools, etc.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a code improvement for t4ai-signature-detect-server! Your feedback is valuable for enhancing the project. Please provide as much detail as possible to help us understand your proposal and implement it effectively.

  - type: checkboxes
    attributes:
      label: Confirm
      description: |
        Please ensure you have reviewed the project's documentation and existing issues before submitting your proposal.
      options:
        - label: I have checked the documentation and issues for similar improvements.
          required: true

  - type: textarea
    attributes:
      label: "t4ai-signature-detect-server Version"
      description: "Please specify the commit or tag version you're using."
      placeholder: |
        Example: version 1.2.3 or commit hash
    validations:
      required: true

  - type: textarea
    attributes:
      label: "Current Implementation"
      description: "Describe the current implementation and what you find suboptimal."
      placeholder: |
        Example: The current model loading process is too slow due to redundant file checks.
    validations:
      required: true

  - type: textarea
    attributes:
      label: "Proposed Improvement"
      description: "Describe your proposed solution or improvement. Be as specific as possible."
      placeholder: |
        Example: Implement asynchronous file loading to reduce startup time by 30%.
    validations:
      required: true

  - type: textarea
    attributes:
      label: "Benefits"
      description: "Explain the benefits of your proposed improvement."
      placeholder: |
        Example: Reduces server startup time, improves resource utilization, enhances scalability.
    validations:
      required: true

  - type: textarea
    attributes:
      label: "Related Code"
      description: "Provide examples of the current code or the code you propose to implement."
      placeholder: |
        ```
        # Current code:
        def predict():
            # current implementation...

        # Proposed code:
        async def predict():
            # asynchronous implementation...
        ```
    validations:
      required: true

  - type: textarea
    attributes:
      label: "Additional Information"
      description: "Include any other relevant information, such as related issues, Stack Overflow links, or forum discussions."
      placeholder: |
        Example: Related issue #123, Stack Overflow thread https://...