model_repository: /home/samuel/codes/tech4/tests/triton-server/signature-detection/models

run_config_search_mode: optuna
run_config_search_max_instance_count: 2
run_config_search_min_concurrency: 1
run_config_search_max_concurrency: 32

use_concurrency_formula: True
min_percentage_of_search_space: 20
optuna_max_trials: 200
optuna_early_exit_threshold: 20

num_configs_per_model: 15  
profile_models:
  yolov8s:
    cpu_only: true
    model_config_parameters:
      max_batch_size: [1, 4, 8, 16]
      dynamic_batching:
        max_queue_delay_microseconds: [0, 200, 500]
    parameters:
      batch_sizes: 1, 2, 4, 8, 16
    
perf_analyzer_flags:
  shape: 'images:3,640,640'

objectives:
  - perf_throughput
  - perf_latency_p99
 
